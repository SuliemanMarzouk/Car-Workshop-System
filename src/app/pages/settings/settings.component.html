<div class="max-w-2xl space-y-6">
  <div>
    <h1 class="text-2xl font-bold text-gray-900">{{ 'settings.title' | translate }}</h1>
    <p class="text-gray-500 mt-1">{{ 'settings.subtitle' | translate }}</p>
  </div>

  <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-6 space-y-6">
    <div>
      <h3 class="text-lg font-bold text-gray-900 mb-4">{{ 'settings.general' | translate }}</h3>
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">{{ 'settings.workshop_name' | translate }}</label>
          <input 
            type="text" 
            value="Car Service Center" 
            class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
          >
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">{{ 'settings.currency' | translate }}</label>
          <select class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            <option>SAR (Saudi Riyal)</option>
            <option>USD (US Dollar)</option>
          </select>
        </div>
      </div>
    </div>

    <div class="pt-4 border-t border-gray-100">
      <h3 class="text-lg font-bold text-gray-900 mb-4">{{ 'settings.notifications' | translate }}</h3>
      <div class="space-y-3">
        <label class="flex items-center gap-3">
          <input type="checkbox" checked class="w-4 h-4 text-blue-600 rounded border-gray-300 focus:ring-blue-500">
          <span class="text-gray-700">{{ 'settings.email_notif' | translate }}</span>
        </label>
        <label class="flex items-center gap-3">
          <input type="checkbox" checked class="w-4 h-4 text-blue-600 rounded border-gray-300 focus:ring-blue-500">
          <span class="text-gray-700">{{ 'settings.sms_notif' | translate }}</span>
        </label>
      </div>
    </div>

    <div class="pt-6">
      <button class="flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-700 text-white py-2.5 px-6 rounded-lg font-medium transition-colors">
        <lucide-icon [name]="Save" class="w-5 h-5"></lucide-icon>
        {{ 'common.save' | translate }}
      </button>
    </div>
  </div>
</div>
