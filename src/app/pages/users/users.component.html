<div class="space-y-6">
  <div class="flex items-center justify-between">
    <div>
      <h1 class="text-2xl font-bold text-gray-900">{{ 'users.title' | translate }}</h1>
      <p class="text-gray-500 mt-1">{{ 'users.subtitle' | translate }}</p>
    </div>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    <div *ngFor="let user of users" class="bg-white p-6 rounded-xl border border-gray-100 shadow-sm flex items-start gap-4">
      <div class="w-12 h-12 bg-blue-50 rounded-full flex items-center justify-center flex-shrink-0">
        <lucide-icon [name]="User" class="w-6 h-6 text-blue-600"></lucide-icon>
      </div>
      <div class="flex-1">
        <h3 class="text-lg font-bold text-gray-900">{{ user.name }}</h3>
        <div class="flex items-center gap-2 text-gray-500 text-sm mt-1">
          <lucide-icon [name]="Mail" class="w-3 h-3"></lucide-icon>
          {{ user.email }}
        </div>
        <div class="flex items-center gap-2 text-gray-500 text-sm mt-1">
          <lucide-icon [name]="Shield" class="w-3 h-3"></lucide-icon>
          {{ user.role }}
        </div>
        <div class="mt-4 flex items-center justify-between">
          <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-800">
            {{ 'status.' + user.status | translate }}
          </span>
          <button class="text-sm text-blue-600 hover:text-blue-800 font-medium">{{ 'common.edit' | translate }}</button>
        </div>
      </div>
    </div>
  </div>
</div>
