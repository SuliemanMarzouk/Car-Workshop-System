<div class="flex min-h-screen items-center justify-center bg-surface-bg px-4">
  <div class="max-w-md text-center">
    <lucide-icon [name]="PauseCircle" class="mx-auto mb-4 h-14 w-14 text-amber-600"></lucide-icon>
    <h1 class="text-2xl font-bold text-surface-fg">{{ 'errors.workshop_suspended_title' | translate }}</h1>
    <p class="mt-2 text-surface-muted">
      {{ 'errors.workshop_suspended_body' | translate }}
      <strong *ngIf="workshopName" class="block mt-1 text-surface-fg">{{ workshopName }}</strong>
    </p>
    <a [href]="platformUrl" class="btn-secondary mt-6 inline-flex">
      {{ 'saas_admin.platform_title' | translate }}
    </a>
  </div>
</div>
