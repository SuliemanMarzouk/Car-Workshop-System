<div class="app-page">
  <div class="animate-slide-up">
    <h2 class="page-title">{{ 'dashboard.title' | translate }}</h2>
    <p class="page-subtitle">{{ 'dashboard.subtitle' | translate }}</p>
  </div>

  <div class="grid grid-cols-1 gap-6 md:grid-cols-2 lg:grid-cols-4">
    <app-stat-card
      class="stagger-1 block"
      [title]="'dashboard.stats.total_cars' | translate"
      [value]="loading() ? '...' : totalCars()"
      [icon]="Car"
      iconColor="text-brand-600 dark:text-brand-400"
      iconBgColor="bg-brand-100 dark:bg-brand-900/40"
    ></app-stat-card>
    <app-stat-card
      class="stagger-2 block"
      [title]="'dashboard.stats.pending_orders' | translate"
      [value]="loading() ? '...' : pendingOrders()"
      [icon]="Clock"
      iconColor="text-amber-600 dark:text-amber-400"
      iconBgColor="bg-amber-100 dark:bg-amber-900/40"
    ></app-stat-card>
    <app-stat-card
      class="stagger-3 block"
      [title]="'dashboard.stats.active_orders' | translate"
      [value]="loading() ? '...' : approvedOrders()"
      [icon]="CheckCircle"
      iconColor="text-emerald-600 dark:text-emerald-400"
      iconBgColor="bg-emerald-100 dark:bg-emerald-900/40"
    ></app-stat-card>
    <app-stat-card
      class="stagger-4 block"
      [title]="'dashboard.stats.total_invoices' | translate"
      [value]="loading() ? '...' : currencyService.formatAmount(+invoicesToday(), currencyService.systemCurrency())"
      [icon]="DollarSign"
      iconColor="text-violet-600 dark:text-violet-400"
      iconBgColor="bg-violet-100 dark:bg-violet-900/40"
    ></app-stat-card>
  </div>

  <div class="app-card animate-slide-up p-6" style="animation-delay: 0.15s">
    <h3 class="mb-4 text-lg font-bold text-surface-fg">{{ 'dashboard.quick_actions.title' | translate }}</h3>
    <div class="grid grid-cols-1 gap-4 md:grid-cols-2 lg:grid-cols-4">
      <button type="button" (click)="navigateTo('/cars')" class="btn-primary w-full">
        <lucide-icon [name]="Plus" class="h-5 w-5"></lucide-icon>
        {{ 'dashboard.quick_actions.add_car' | translate }}
      </button>
      <button type="button" (click)="navigateTo('/work-orders')" class="btn-success w-full">
        <lucide-icon [name]="FileText" class="h-5 w-5"></lucide-icon>
        {{ 'dashboard.quick_actions.create_order' | translate }}
      </button>
      <button type="button" (click)="printQrPlaceholder()" class="btn-ghost w-full border-violet-300 text-violet-700 hover:bg-violet-50 dark:border-violet-700 dark:text-violet-300 dark:hover:bg-violet-900/30">
        <lucide-icon [name]="QrCode" class="h-5 w-5"></lucide-icon>
        {{ 'dashboard.quick_actions.print_qr' | translate }}
      </button>
      <button type="button" (click)="navigateTo('/invoices')" class="btn-ghost w-full border-orange-300 text-orange-700 hover:bg-orange-50 dark:border-orange-700 dark:text-orange-300 dark:hover:bg-orange-900/30">
        <lucide-icon [name]="Receipt" class="h-5 w-5"></lucide-icon>
        {{ 'dashboard.quick_actions.generate_invoice' | translate }}
      </button>
    </div>
  </div>

  <app-recent-orders class="block animate-slide-up" style="animation-delay: 0.2s"></app-recent-orders>
</div>
