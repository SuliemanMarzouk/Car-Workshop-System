<div class="app-page">
  <div>
    <h1 class="page-title">{{ 'users.title' | translate }}</h1>
    <p class="page-subtitle">{{ 'users.subtitle' | translate }}</p>
    <p class="mt-2 text-sm text-surface-muted">{{ 'users.only_current' | translate }}</p>
  </div>

  <div *ngIf="loading()" class="text-surface-muted">{{ 'common.loading' | translate }}</div>

  <div class="grid grid-cols-1 gap-6 md:grid-cols-2 lg:grid-cols-3">
    <div *ngFor="let user of users()" class="app-card flex items-start gap-4 p-6">
      <div class="flex h-12 w-12 flex-shrink-0 items-center justify-center rounded-full bg-accent-muted">
        <lucide-icon [name]="User" class="h-6 w-6 text-brand-600"></lucide-icon>
      </div>
      <div class="flex-1">
        <h3 class="text-lg font-bold text-surface-fg">{{ user.name }}</h3>
        <div class="mt-1 flex items-center gap-2 text-sm text-surface-muted">
          <lucide-icon [name]="Mail" class="h-3 w-3"></lucide-icon>
          {{ user.email }}
        </div>
        <div class="mt-1 flex items-center gap-2 text-sm text-surface-muted">
          <lucide-icon [name]="Shield" class="h-3 w-3"></lucide-icon>
          {{ 'users.role_admin' | translate }}
        </div>
        <div class="mt-4">
          <span class="badge-completed">{{ 'status.active' | translate }}</span>
        </div>
      </div>
    </div>
  </div>
</div>
