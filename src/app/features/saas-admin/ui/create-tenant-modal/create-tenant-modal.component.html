<div
  *ngIf="open()"
  class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/60 p-4 backdrop-blur-sm"
  (click)="close()"
>
  <div
    class="platform-card max-h-[90vh] w-full max-w-3xl overflow-y-auto shadow-2xl"
    (click)="$event.stopPropagation()"
  >
    <div class="mb-6 flex items-start justify-between gap-4">
      <div>
        <h3 class="text-xl font-bold text-slate-900 dark:text-white">
          {{ 'saas_admin.create_tenant' | translate }}
        </h3>
        <p class="mt-1 text-sm text-slate-500">{{ 'saas_admin.create_tenant_hint' | translate }}</p>
      </div>
      <button type="button" class="btn-icon" (click)="close()">
        <lucide-icon [name]="X" class="h-5 w-5"></lucide-icon>
      </button>
    </div>

    <form class="space-y-6" (ngSubmit)="submit()">
      <fieldset class="space-y-4">
        <legend class="text-sm font-semibold text-indigo-600">
          {{ 'saas_admin.section_identity' | translate }}
        </legend>
        <div class="grid gap-4 sm:grid-cols-2">
          <div class="sm:col-span-2">
            <label class="mb-1 block text-sm font-medium">{{ 'saas_admin.workshop_name' | translate }} *</label>
            <input
              class="input-field w-full"
              required
              [(ngModel)]="form.workshop_name"
              (ngModelChange)="onWorkshopNameChange()"
              name="workshop_name"
            />
          </div>
          <div>
            <label class="mb-1 block text-sm font-medium">{{ 'saas_admin.workshop_id' | translate }} *</label>
            <input class="input-field w-full font-mono text-sm" required [(ngModel)]="form.id" name="id" />
            <p class="mt-1 text-xs text-slate-500">{{ 'saas_admin.workshop_id_hint' | translate }}</p>
          </div>
          <div>
            <label class="mb-1 block text-sm font-medium">{{ 'saas_admin.domain' | translate }}</label>
            <input
              class="input-field w-full"
              [(ngModel)]="form.domain"
              name="domain"
              [placeholder]="form.id ? form.id + '.localhost' : ''"
            />
          </div>
        </div>
      </fieldset>

      <fieldset class="space-y-4">
        <legend class="text-sm font-semibold text-indigo-600">
          {{ 'saas_admin.section_contact' | translate }}
        </legend>
        <div class="grid gap-4 sm:grid-cols-2">
          <div>
            <label class="mb-1 block text-sm font-medium">{{ 'settings.phone' | translate }} *</label>
            <input class="input-field w-full" required [(ngModel)]="form.phone" name="phone" />
          </div>
          <div>
            <label class="mb-1 block text-sm font-medium">{{ 'settings.email' | translate }} *</label>
            <input type="email" class="input-field w-full" required [(ngModel)]="form.email" name="email" />
          </div>
          <div class="sm:col-span-2">
            <label class="mb-1 block text-sm font-medium">{{ 'settings.address' | translate }}</label>
            <input class="input-field w-full" [(ngModel)]="form.address" name="address" />
          </div>
          <div>
            <label class="mb-1 block text-sm font-medium">{{ 'settings.city' | translate }}</label>
            <input class="input-field w-full" [(ngModel)]="form.city" name="city" />
          </div>
          <div>
            <label class="mb-1 block text-sm font-medium">{{ 'settings.country' | translate }}</label>
            <input class="input-field w-full" [(ngModel)]="form.country" name="country" />
          </div>
        </div>
      </fieldset>

      <fieldset class="space-y-4">
        <legend class="text-sm font-semibold text-indigo-600">
          {{ 'saas_admin.section_business' | translate }}
        </legend>
        <div class="grid gap-4 sm:grid-cols-3">
          <div>
            <label class="mb-1 block text-sm font-medium">{{ 'settings.tax_number' | translate }}</label>
            <input class="input-field w-full" [(ngModel)]="form.tax_number" name="tax_number" />
          </div>
          <div>
            <label class="mb-1 block text-sm font-medium">{{ 'settings.currency' | translate }} *</label>
            <select class="input-field w-full" [(ngModel)]="form.default_currency" name="default_currency">
              <option value="USD">USD</option>
              <option value="SAR">SAR</option>
            </select>
          </div>
          <div>
            <label class="mb-1 block text-sm font-medium">{{ 'settings.vat_rate' | translate }} *</label>
            <input
              type="number"
              step="0.01"
              min="0"
              max="100"
              class="input-field w-full"
              [ngModel]="form.vat_rate * 100"
              (ngModelChange)="form.vat_rate = $event / 100"
              name="vat_rate_percent"
            />
          </div>
        </div>
        <div class="flex flex-wrap gap-4">
          <label class="flex items-center gap-2 text-sm">
            <input type="checkbox" [(ngModel)]="form.email_notifications" name="email_notifications" />
            {{ 'settings.email_notif' | translate }}
          </label>
          <label class="flex items-center gap-2 text-sm">
            <input type="checkbox" [(ngModel)]="form.sms_notifications" name="sms_notifications" />
            {{ 'settings.sms_notif' | translate }}
          </label>
        </div>
      </fieldset>

      <div class="flex justify-end gap-2 border-t border-slate-100 pt-4 dark:border-slate-800">
        <button type="button" class="btn-secondary" (click)="close()">
          {{ 'saas_admin.cancel' | translate }}
        </button>
        <button type="submit" class="btn-primary" [disabled]="loading()">
          <lucide-icon *ngIf="loading()" [name]="Loader2" class="h-4 w-4 animate-spin"></lucide-icon>
          {{ 'saas_admin.save' | translate }}
        </button>
      </div>
    </form>
  </div>
</div>
