<app-auth-layout 
    [title]="'auth.forgot_password_title' | translate" 
    [subtitle]="'auth.forgot_password_subtitle' | translate"
>
  <div class="mb-8 text-center">
    <h3 class="page-title">{{ 'auth.forgot_password_title' | translate }}</h3>
  </div>

  <div *ngIf="status().message" [ngClass]="['mb-6 p-4 border-l-4 rounded-r animate-pulse flex items-center gap-2', status().type === 'success' ? 'bg-green-50 border-green-500 text-green-700' : 'bg-red-50 border-red-500 text-red-700']">
    <lucide-icon [name]="status().type === 'success' ? CheckCircle : AlertCircle" class="w-5 h-5"></lucide-icon>
    <span class="text-sm font-medium">{{ status().message }}</span>
  </div>

  <form (ngSubmit)="handleSubmit()" class="space-y-6">
    <div class="space-y-2">
      <label class="text-sm font-medium text-gray-700 block">
        {{ 'auth.email' | translate }}
      </label>
      <div class="relative group">
        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
          <lucide-icon [name]="Mail" class="h-5 w-5 text-gray-400 group-focus-within:text-blue-500 transition-colors"></lucide-icon>
        </div>
        <input
          type="email"
          name="email"
          required
          class="block w-full pl-10 pr-3 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all bg-gray-50 focus:bg-white"
          placeholder="name@company.com"
          [(ngModel)]="email"
        />
      </div>
    </div>

    <button
      type="submit"
      [disabled]="loading()"
      class="w-full flex justify-center items-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 disabled:opacity-50 disabled:cursor-not-allowed transition-all transform hover:-translate-y-0.5"
    >
      <ng-container *ngIf="loading(); else buttonText">
        <lucide-icon [name]="Loader2" class="w-5 h-5 animate-spin mr-2"></lucide-icon>
        {{ 'auth.send_reset_link' | translate }}...
      </ng-container>
      <ng-template #buttonText>
        {{ 'auth.send_reset_link' | translate }}
      </ng-template>
    </button>
  </form>

  <div class="mt-8 text-center">
    <a 
        routerLink="/login" 
        class="inline-flex items-center text-sm font-medium text-blue-600 hover:text-blue-500 hover:underline"
    >
        <ng-container *ngIf="isRtl(); else ltrBack">
            {{ 'auth.back_to_login' | translate }} <lucide-icon [name]="ArrowLeft" class="w-4 h-4 mr-2 rotate-180"></lucide-icon>
        </ng-container>
        <ng-template #ltrBack>
            <lucide-icon [name]="ArrowLeft" class="w-4 h-4 mr-2"></lucide-icon> {{ 'auth.back_to_login' | translate }}
        </ng-template>
    </a>
  </div>
</app-auth-layout>
