<app-auth-layout 
    [title]="'auth.join_us' | translate" 
    [subtitle]="'auth.join_subtitle' | translate"
>
  <div class="mb-8 text-center">
    <h3 class="page-title">{{ 'auth.register_title' | translate }}</h3>
  </div>

  <div *ngIf="error()" class="mb-6 p-4 bg-red-50 border-l-4 border-red-500 text-red-700 flex items-center gap-2 rounded-r animate-pulse">
    <lucide-icon [name]="AlertCircle" class="w-5 h-5"></lucide-icon>
    <span class="text-sm font-medium">{{ error() }}</span>
  </div>

  <form (ngSubmit)="handleSubmit()" class="space-y-4">
    <div class="space-y-2">
      <label class="text-sm font-medium text-gray-700 block">
        {{ 'auth.name' | translate }}
      </label>
      <div class="relative group">
        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
          <lucide-icon [name]="User" class="h-5 w-5 text-gray-400 group-focus-within:text-blue-500 transition-colors"></lucide-icon>
        </div>
        <input
          type="text"
          name="name"
          required
          [ngClass]="{'border-red-500': fieldErrors().name}"
          class="block w-full pl-10 pr-3 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all bg-gray-50 focus:bg-white"
          placeholder="John Doe"
          [(ngModel)]="formData.name"
        />
      </div>
      <p *ngIf="fieldErrors().name" class="text-xs text-red-500">{{ fieldErrors().name[0] }}</p>
    </div>

    <div class="space-y-2">
      <label class="text-sm font-medium text-gray-700 block">
        {{ 'auth.email' | translate }}
      </label>
      <div class="relative group">
        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
          <lucide-icon [name]="Mail" class="h-5 w-5 text-gray-400 group-focus-within:text-blue-500 transition-colors"></lucide-icon>
        </div>
        <input
          type="email"
          name="email"
          required
          [ngClass]="{'border-red-500': fieldErrors().email}"
          class="block w-full pl-10 pr-3 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all bg-gray-50 focus:bg-white"
          placeholder="name@company.com"
          [(ngModel)]="formData.email"
        />
      </div>
      <p *ngIf="fieldErrors().email" class="text-xs text-red-500">{{ fieldErrors().email[0] }}</p>
    </div>

    <div class="space-y-2">
      <label class="text-sm font-medium text-gray-700 block">
        {{ 'auth.password' | translate }}
      </label>
      <div class="relative group">
        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
          <lucide-icon [name]="Lock" class="h-5 w-5 text-gray-400 group-focus-within:text-blue-500 transition-colors"></lucide-icon>
        </div>
        <input
          type="password"
          name="password"
          required
          [ngClass]="{'border-red-500': fieldErrors().password}"
          class="block w-full pl-10 pr-3 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all bg-gray-50 focus:bg-white"
          placeholder="••••••••"
          [(ngModel)]="formData.password"
        />
      </div>
      <p *ngIf="fieldErrors().password" class="text-xs text-red-500">{{ fieldErrors().password[0] }}</p>
    </div>

    <div class="space-y-2">
      <label class="text-sm font-medium text-gray-700 block">
        {{ 'auth.confirm_password' | translate }}
      </label>
      <div class="relative group">
        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
          <lucide-icon [name]="Lock" class="h-5 w-5 text-gray-400 group-focus-within:text-blue-500 transition-colors"></lucide-icon>
        </div>
        <input
          type="password"
          name="password_confirmation"
          required
          class="block w-full pl-10 pr-3 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all bg-gray-50 focus:bg-white"
          placeholder="••••••••"
          [(ngModel)]="formData.password_confirmation"
        />
      </div>
    </div>

    <button
      type="submit"
      [disabled]="loading()"
      class="w-full flex justify-center items-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 disabled:opacity-50 disabled:cursor-not-allowed transition-all transform hover:-translate-y-0.5 mt-6"
    >
      <ng-container *ngIf="loading(); else buttonText">
        <lucide-icon [name]="Loader2" class="w-5 h-5 animate-spin mr-2"></lucide-icon>
        {{ 'auth.register_button' | translate }}...
      </ng-container>
      <ng-template #buttonText>
        {{ 'auth.register_button' | translate }}
      </ng-template>
    </button>
  </form>

  <div class="mt-8 text-center">
    <p class="text-sm text-gray-600">
      {{ 'auth.have_account' | translate }} 
      <a routerLink="/login" class="font-medium text-blue-600 hover:text-blue-500 hover:underline">
        {{ 'auth.login_button' | translate }}
      </a>
    </p>
  </div>
</app-auth-layout>
