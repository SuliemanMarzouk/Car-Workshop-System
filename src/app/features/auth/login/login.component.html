<app-auth-layout [title]="'auth.welcome_back' | translate" [subtitle]="'auth.welcome_subtitle' | translate">
  <div class="mb-8 text-center animate-slide-up">
    <h3 class="text-2xl font-bold text-surface-fg">{{ 'auth.login_title' | translate }}</h3>
  </div>

  <div
    *ngIf="error()"
    class="mb-6 flex items-center gap-2 rounded-xl border border-rose-500/30 bg-rose-500/10 p-4 text-rose-700 animate-scale-in dark:text-rose-300"
  >
    <lucide-icon [name]="AlertCircle" class="h-5 w-5 shrink-0"></lucide-icon>
    <span class="text-sm font-medium">{{ error() }}</span>
  </div>

  <form (ngSubmit)="handleSubmit()" class="space-y-6 animate-slide-up stagger-1">
    <div class="space-y-2">
      <label class="block text-sm font-medium text-surface-fg">{{ 'auth.email' | translate }}</label>
      <div class="relative group">
        <lucide-icon
          [name]="Mail"
          class="pointer-events-none absolute start-3 top-1/2 h-5 w-5 -translate-y-1/2 text-surface-subtle transition-colors group-focus-within:text-brand-500"
        ></lucide-icon>
        <input
          type="email"
          name="email"
          required
          class="input-field ps-10"
          placeholder="name@company.com"
          [(ngModel)]="formData.email"
        />
      </div>
    </div>

    <div class="space-y-2">
      <label class="block text-sm font-medium text-surface-fg">{{ 'auth.password' | translate }}</label>
      <div class="relative group">
        <lucide-icon
          [name]="Lock"
          class="pointer-events-none absolute start-3 top-1/2 h-5 w-5 -translate-y-1/2 text-surface-subtle transition-colors group-focus-within:text-brand-500"
        ></lucide-icon>
        <input
          type="password"
          name="password"
          required
          class="input-field ps-10"
          placeholder="••••••••"
          [(ngModel)]="formData.password"
        />
      </div>
    </div>

    <div class="flex items-center justify-between">
      <label class="flex cursor-pointer items-center gap-2 text-sm text-surface-muted">
        <input type="checkbox" class="rounded border-surface-border text-brand-600 focus:ring-brand-500" />
        {{ 'auth.remember_me' | translate }}
      </label>
      <a routerLink="/forgot-password" class="text-sm font-semibold text-brand-600 hover:text-brand-700 dark:text-brand-400">
        {{ 'auth.forgot_password' | translate }}
      </a>
    </div>

    <button type="submit" [disabled]="loading()" class="btn-primary w-full py-3">
      <lucide-icon *ngIf="loading()" [name]="Loader2" class="h-5 w-5 animate-spin"></lucide-icon>
      <span>{{ 'auth.login_button' | translate }}</span>
    </button>
  </form>

  <p class="mt-8 text-center text-sm text-surface-muted animate-slide-up stagger-2">
    {{ 'auth.no_account' | translate }}
    <a routerLink="/register" class="font-semibold text-brand-600 hover:underline dark:text-brand-400">
      {{ 'auth.register_button' | translate }}
    </a>
  </p>
</app-auth-layout>
