<div class="stat-card group">
  <div>
    <p class="mb-1 text-sm font-medium text-surface-muted">{{ title }}</p>
    <h3 class="text-2xl font-bold tracking-tight text-surface-fg transition-transform duration-300 group-hover:scale-105">
      {{ value }}
    </h3>
  </div>
  <div
    [ngClass]="[
      'rounded-2xl p-3 transition-all duration-300 group-hover:scale-110 group-hover:shadow-glow',
      iconBgColor
    ]"
  >
    <lucide-icon [name]="icon" [ngClass]="['h-7 w-7', iconColor]"></lucide-icon>
  </div>
</div>
