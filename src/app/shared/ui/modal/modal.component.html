<div *ngIf="isOpen" class="relative z-50 animate-fade-in" aria-labelledby="modal-title" role="dialog" aria-modal="true">
  <div class="fixed inset-0 bg-black/60 backdrop-blur-sm transition-opacity" (click)="close()"></div>

  <div class="fixed inset-0 z-10 overflow-y-auto">
    <div class="flex min-h-full items-end justify-center p-4 text-center sm:items-center sm:p-0">
      <div
        [ngClass]="[
          'relative w-full transform overflow-hidden rounded-2xl border border-surface-border bg-surface-card text-start shadow-card-hover transition-all animate-scale-in sm:my-8',
          getMaxWidthClass()
        ]"
      >
        <div class="absolute end-0 top-0 hidden pe-4 pt-4 sm:block">
          <button
            type="button"
            class="rounded-lg p-1 text-surface-muted transition-colors hover:bg-surface-elevated hover:text-surface-fg"
            (click)="close()"
          >
            <span class="sr-only">Close</span>
            <lucide-icon [name]="X" class="h-6 w-6"></lucide-icon>
          </button>
        </div>
        <div class="p-6">
          <h3 class="mb-4 text-xl font-semibold text-surface-fg" id="modal-title">{{ title }}</h3>
          <ng-content></ng-content>
        </div>
      </div>
    </div>
  </div>
</div>
