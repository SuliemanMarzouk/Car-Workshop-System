<div class="min-h-screen bg-gray-50 flex flex-col font-sans" [dir]="currentLang() === 'ar' ? 'rtl' : 'ltr'">
  <!-- Top Navigation Bar -->
  <header class="bg-white border-b border-gray-200 h-16 px-4 md:px-6 flex items-center justify-between sticky top-0 z-30">
    <div class="flex items-center gap-3">
      <button 
        class="md:hidden p-2 text-gray-600 hover:bg-gray-100 rounded-lg"
        (click)="toggleSidebar()"
      >
        <lucide-icon [name]="isSidebarOpen() ? X : Menu" class="w-6 h-6"></lucide-icon>
      </button>
      
      <div class="bg-blue-50 p-2 rounded-lg">
        <lucide-icon [name]="Car" class="w-6 h-6 text-blue-600"></lucide-icon>
      </div>
      <a routerLink="/" class="text-xl font-bold text-gray-800 hidden sm:block">
        {{ 'app_title' | translate }}
      </a>
    </div>

    <div class="flex items-center gap-2 md:gap-6">
      <button 
        (click)="toggleLanguage()"
        class="flex items-center gap-2 px-3 py-1.5 rounded-lg hover:bg-gray-100 text-gray-600 text-sm font-medium transition-colors"
      >
        <lucide-icon [name]="Globe" class="w-4 h-4"></lucide-icon>
        {{ currentLang() === 'en' ? 'العربية' : 'English' }}
      </button>

      <div [ngClass]="{'pr-2 md:pr-6 border-r': currentLang() === 'ar', 'pl-2 md:pl-6 border-l': currentLang() === 'en'}" class="flex items-center gap-3 border-gray-200">
        <div class="flex items-center gap-3">
          <div class="w-8 h-8 md:w-10 md:h-10 bg-gray-100 rounded-full flex items-center justify-center">
            <lucide-icon [name]="User" class="w-5 h-5 text-gray-600"></lucide-icon>
          </div>
          <div class="hidden md:block text-start">
            <p class="text-sm font-bold text-gray-900">{{ user()?.name || 'User' }}</p>
            <p class="text-xs text-gray-500">{{ 'admin' | translate }}</p>
          </div>
        </div>
        <button 
          (click)="logout()"
          [ngClass]="{'mr-2 md:mr-4': currentLang() === 'ar', 'ml-2 md:ml-4': currentLang() === 'en'}"
          class="flex items-center gap-2 text-gray-500 hover:text-red-600 transition-colors"
        >
          <lucide-icon [name]="LogOut" class="w-5 h-5"></lucide-icon>
          <span class="hidden md:inline text-sm font-medium">{{ 'logout' | translate }}</span>
        </button>
      </div>
    </div>
  </header>

  <div class="flex flex-1 overflow-hidden relative">
    <!-- Sidebar -->
    <div [ngClass]="{
      'fixed inset-y-0 z-20 w-64 bg-white transform transition-transform duration-300 ease-in-out md:relative md:translate-x-0 border-r border-gray-200 pt-16 md:pt-0 shadow-lg md:shadow-none': true,
      'right-0': currentLang() === 'ar',
      'left-0': currentLang() === 'en',
      'translate-x-0': isSidebarOpen(),
      'translate-x-full': !isSidebarOpen() && currentLang() === 'ar',
      '-translate-x-full': !isSidebarOpen() && currentLang() === 'en'
    }" class="md:flex md:flex-col">
      <app-sidebar (onClose)="closeSidebar()"></app-sidebar>
    </div>

    <!-- Overlay for mobile sidebar -->
    <div *ngIf="isSidebarOpen()"
      class="fixed inset-0 bg-black bg-opacity-50 z-10 md:hidden"
      (click)="closeSidebar()"
    ></div>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto p-4 md:p-8 w-full">
      <div class="max-w-7xl mx-auto space-y-8">
        <router-outlet></router-outlet>
      </div>
    </main>
  </div>
</div>
