<aside class="w-full h-full bg-white flex flex-col py-6">
  <nav class="flex-1 space-y-1 px-4">
    <a
      *ngFor="let item of menuItems"
      [routerLink]="item.path"
      [routerLinkActive]="'bg-blue-50 text-blue-600'"
      [routerLinkActiveOptions]="{exact: item.path === '/'}"
      (click)="close()"
      class="flex items-center gap-3 px-4 py-3 text-sm font-medium rounded-lg transition-colors text-gray-600 hover:bg-gray-50 hover:text-gray-900"
      #rla="routerLinkActive"
    >
      <lucide-icon [name]="item.icon" [ngClass]="rla.isActive ? 'text-blue-600' : 'text-gray-500'" class="w-5 h-5"></lucide-icon>
      {{ item.label | translate }}
    </a>
  </nav>
</aside>
