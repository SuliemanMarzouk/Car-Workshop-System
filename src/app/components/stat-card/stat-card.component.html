<div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex items-center justify-between">
  <div>
    <p class="text-gray-500 text-sm font-medium mb-1">{{ title }}</p>
    <h3 class="text-2xl font-bold text-gray-900">{{ value }}</h3>
  </div>
  <div [ngClass]="['p-3 rounded-xl', iconBgColor]">
    <lucide-icon [name]="icon" [ngClass]="['w-6 h-6', iconColor]"></lucide-icon>
  </div>
</div>
