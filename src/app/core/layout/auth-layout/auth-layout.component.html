<div class="flex min-h-screen flex-col overflow-hidden bg-surface md:flex-row" [dir]="language.isArabic() ? 'rtl' : 'ltr'">
  <div
    class="relative flex min-h-[300px] w-full flex-col justify-between overflow-hidden md:min-h-screen md:w-1/2"
    style="background: var(--gradient-brand)"
  >
    <div class="pointer-events-none absolute inset-0 opacity-30">
      <div class="absolute -left-24 -top-24 h-96 w-96 animate-spin-slow rounded-full border-8 border-white/30"></div>
      <div
        class="absolute right-0 top-1/2 h-64 w-64 animate-spin-slow rounded-full border-8 border-white/20"
        style="animation-direction: reverse"
      ></div>
      <div class="absolute inset-0 bg-[length:200%_100%] animate-shimmer bg-gradient-to-r from-transparent via-white/10 to-transparent"></div>
    </div>

    <div class="relative z-10 mt-10 p-8 text-white md:mt-20 md:p-12">
      <div class="mb-6 flex items-center gap-3 animate-slide-up">
        <div class="rounded-xl bg-white/20 p-2 shadow-lg backdrop-blur-md">
          <lucide-icon [name]="Car" class="h-8 w-8 text-white"></lucide-icon>
        </div>
        <h1 class="text-2xl font-bold">{{ 'app_title' | translate }}</h1>
      </div>
      <h2 class="mb-4 text-4xl font-bold leading-tight md:text-5xl animate-slide-up stagger-1">{{ title }}</h2>
      <p class="max-w-md text-lg text-blue-100/90 animate-slide-up stagger-2">{{ subtitle }}</p>
    </div>

    <div class="relative z-10 mt-auto w-full">
      <div class="relative h-24 overflow-hidden bg-black/20">
        <div class="absolute left-0 right-0 top-1/2 h-2 bg-white/25"></div>
        <div class="absolute bottom-4 left-0 right-0 h-4 animate-road"></div>
      </div>
      <div class="absolute bottom-8 left-1/2 -translate-x-1/2 animate-float">
        <lucide-icon [name]="Car" class="h-32 w-32 text-white drop-shadow-2xl"></lucide-icon>
      </div>
    </div>
  </div>

  <div class="relative flex w-full flex-col bg-surface md:w-1/2">
    <div
      class="absolute top-4 z-20 flex gap-2"
      [ngClass]="language.isArabic() ? 'left-4' : 'right-4'"
    >
      <app-theme-toggle></app-theme-toggle>
      <button type="button" (click)="toggleLanguage()" class="toolbar-btn shadow-md">
        <lucide-icon [name]="Globe" class="h-4 w-4"></lucide-icon>
        <span>{{ language.language() === 'en' ? 'العربية' : 'English' }}</span>
      </button>
    </div>

    <div class="flex flex-1 items-center justify-center p-6 md:p-12">
      <div class="app-card w-full max-w-md animate-scale-in p-8 shadow-card-hover">
        <ng-content></ng-content>
      </div>
    </div>

    <div class="p-6 text-center text-sm text-surface-muted">
      &copy; {{ currentYear }} {{ 'app_title' | translate }}. All rights reserved.
    </div>
  </div>
</div>
